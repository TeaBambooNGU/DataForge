name: test
theme: test_theme
language: zh
task_type: classification
entry_schema: conversation_action
runtime:
  generator:
    temperature: 0
    max_tokens: 1024
    max_retries: 2
    retry_backoff_seconds: 1
    response_format_json_object: true
    base_url_env: OPENAI_BASE_URL
    api_key_env: OPENAI_API_KEY
    provider: openai_compatible
    model: gpt-5.4
  teacher:
    temperature: 0
    max_tokens: 1024
    max_retries: 2
    retry_backoff_seconds: 1
    base_url_env: MINIMAX_BASE_URL
    api_key_env: MINIMAX_API_KEY
    provider: minimax
    model: MiniMax-M2.7
  eval:
    temperature: 0
    max_tokens: 1024
    max_retries: 2
    retry_backoff_seconds: 1
    base_url_env: MINIMAX_BASE_URL
    api_key_env: MINIMAX_API_KEY
    provider: minimax
    model: MiniMax-M2.7
paths:
  labels: tasks/test/configs/labels.yaml
  scenario_matrix: tasks/test/configs/scenario_matrix.yaml
  generator_prompt: tasks/test/configs/generator_prompt.txt
  teacher_prompt: tasks/test/configs/teacher_prompt.txt
  promptfoo: tasks/test/configs/promptfoo.yaml
rules:
  disallow_rewrite_without_visible_report: false
exports:
  train_format: chatml_jsonl
  eval_format: promptfoo_jsonl
  student_format: chatml_jsonl
